replicas: 1

nameOverride: ""
fullnameOverride: ""

commonLabels: {}
commonAnnotations: {}
podLabels: {}
podAnnotations: {}

revisionHistoryLimit: 10
updateStrategy: {}

imagePullSecrets: []
affinity: {}
podAffinityPreset: ""
podAntiAffinityPreset: soft
nodeAffinityPreset:
  type: none
  key: ""
  values: []

podSecurityContext:
  enabled: true
  fsGroupChangePolicy: Always
  supplementalGroups: []
  fsGroup: 1001

containerSecurityContext:
  enabled: true
  runAsUser: 1001
  runAsGroup: 1001
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []

backend:
  api:
    enabled: true
    replicaCount: 1
    image:
      registry: ghcr.io
      repository: ben-wangz/k8s-at-home-agent-task-manager-backend
      tag: 0.1.2
      pullPolicy: IfNotPresent
    command: []
    args: []
    env:
      - name: ATM_API_ADDR
        value: :8080
      - name: ATM_DATABASE_DRIVER
        value: sqlite
      - name: ATM_DATA_DIR
        value: /var/lib/agent-task-manager
      - name: ATM_ARTIFACTS_DIR
        value: /var/lib/agent-task-manager/artifacts
    extraEnvVarsSecret: ""
    extraEnvVars: []
    resources: {}
    persistence:
      enabled: true
      accessModes:
        - ReadWriteOnce
      size: 10Gi
      storageClass: ""
    serviceAccountName: ""

frontend:
  enabled: true
  replicaCount: 1
  podSecurityContext:
    enabled: false
  containerSecurityContext:
    enabled: false
  image:
    registry: ghcr.io
    repository: ben-wangz/k8s-at-home-agent-task-manager-frontend
    tag: 0.1.4
    pullPolicy: IfNotPresent
  apiBaseURL: ""
  command: []
  args: []
  extraEnvVars: []
  resources: {}
  serviceAccountName: ""

service:
  api:
    type: ClusterIP
    port: 8080
    annotations: {}
  web:
    type: ClusterIP
    port: 8080
    annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []
  path: /
  pathType: Prefix

resourcesPreset: nano

extraEnvVars: []
extraEnvVarsSecret: ""
extraVolumeMounts: []
extraVolumes: []

extraDeploy: []
