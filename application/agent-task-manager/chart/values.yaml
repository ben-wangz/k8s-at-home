replicas: 1

commonLabels: {}
commonAnnotations: {}
podLabels: {}
podAnnotations: {}

revisionHistoryLimit: 10
updateStrategy: {}

imagePullSecrets: []
affinity: {}
podAffinityPreset: ""
podAntiAffinityPreset: soft
nodeAffinityPreset:
  type: none
  key: ""
  values: []

podSecurityContext:
  enabled: true
  fsGroupChangePolicy: Always
  supplementalGroups: []
  fsGroup: 1001

containerSecurityContext:
  enabled: true
  runAsUser: 1001
  runAsGroup: 1001
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []

backend:
  api:
    enabled: true
    image:
      registry: ghcr.io
      repository: ben-wangz/k8s-at-home-agent-task-manager-api
      tag: 0.1.0
      pullPolicy: IfNotPresent
    env: []
    extraEnvVarsSecret: ""
    resources: {}

frontend:
  image:
    registry: ghcr.io
    repository: ben-wangz/k8s-at-home-agent-task-manager-frontend
    tag: 0.1.0
    pullPolicy: IfNotPresent
  resources: {}

service:
  api:
    type: ClusterIP
    port: 8080
    annotations: {}
  web:
    type: ClusterIP
    port: 8080
    annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

resourcesPreset: nano

extraEnvVars: []
extraEnvVarsSecret: ""
extraVolumeMounts: []
extraVolumes: []

extraDeploy: []
