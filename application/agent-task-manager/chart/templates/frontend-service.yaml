apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-task-manager.fullname" . }}-frontend
  labels:
    {{- include "agent-task-manager.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.web.type }}
  selector:
    app.kubernetes.io/name: {{ include "agent-task-manager.name" . }}
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: {{ .Values.service.web.port }}
      targetPort: http
