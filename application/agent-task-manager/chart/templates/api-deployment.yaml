{{- if .Values.backend.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-task-manager.fullname" . }}-api
  labels:
    {{- include "agent-task-manager.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "agent-task-manager.name" . }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "agent-task-manager.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.backend.api.image.registry }}/{{ .Values.backend.api.image.repository }}:{{ .Values.backend.api.image.tag }}"
          imagePullPolicy: {{ .Values.backend.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
{{- end }}
