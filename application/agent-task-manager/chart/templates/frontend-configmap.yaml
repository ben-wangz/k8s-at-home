{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent-task-manager.fullname" . }}-frontend-nginx
  labels:
    {{- include "agent-task-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location /api/ {
        proxy_pass http://{{ include "agent-task-manager.fullname" . }}-api:{{ .Values.service.api.port }}/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location = /healthz {
        proxy_pass http://{{ include "agent-task-manager.fullname" . }}-api:{{ .Values.service.api.port }}/healthz;
      }

      location = /readyz {
        proxy_pass http://{{ include "agent-task-manager.fullname" . }}-api:{{ .Values.service.api.port }}/readyz;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }
    }
{{- end }}
