{{- if and .Values.backend.api.enabled .Values.backend.api.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "agent-task-manager.fullname" . }}-api-data
  labels:
    {{- include "agent-task-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  accessModes:
    {{- toYaml .Values.backend.api.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.backend.api.persistence.size }}
  {{- if .Values.backend.api.persistence.storageClass }}
  storageClassName: {{ .Values.backend.api.persistence.storageClass | quote }}
  {{- end }}
{{- end }}
