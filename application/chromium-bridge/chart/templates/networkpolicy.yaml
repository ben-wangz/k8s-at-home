{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "common.names.fullname" . }}-server
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" (dict "customLabels" .Values.commonLabels "context" $) | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "common.labels.matchLabels" (dict "customLabels" (merge (dict "app.kubernetes.io/component" "server") .Values.podLabels) "context" $) | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels: {{- include "common.labels.matchLabels" (dict "customLabels" (merge (dict "app.kubernetes.io/component" "novnc") .Values.podLabels) "context" $) | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.server.ports.vnc }}
    {{- if .Values.networkPolicy.allowExternal }}
    - ports:
        - protocol: TCP
          port: {{ .Values.server.ports.cdp }}
    {{- end }}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.kubeDnsNamespace | quote }}
          podSelector:
            matchLabels: {{- toYaml .Values.networkPolicy.kubeDnsPodLabels | nindent 14 }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- if .Values.networkPolicy.allowExternal }}
    - {}
    {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "common.names.fullname" . }}-novnc
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" (dict "customLabels" .Values.commonLabels "context" $) | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "common.labels.matchLabels" (dict "customLabels" (merge (dict "app.kubernetes.io/component" "novnc") .Values.podLabels) "context" $) | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.networkPolicy.allowExternal }}
    - ports:
        - protocol: TCP
          port: {{ .Values.novnc.port }}
    {{- end }}
  egress:
    - to:
        - podSelector:
            matchLabels: {{- include "common.labels.matchLabels" (dict "customLabels" (merge (dict "app.kubernetes.io/component" "server") .Values.podLabels) "context" $) | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.novnc.target.port }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.kubeDnsNamespace | quote }}
          podSelector:
            matchLabels: {{- toYaml .Values.networkPolicy.kubeDnsPodLabels | nindent 14 }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end -}}
