{{- if and .Values.server.enabled .Values.server.ingress.enabled -}}
apiVersion: {{ include "common.capabilities.ingress.apiVersion" . }}
kind: Ingress
metadata:
  name: {{ include "chromium-bridge.server.fullname" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" (dict "customLabels" .Values.commonLabels "context" $) | nindent 4 }}
  {{- if .Values.server.ingress.annotations }}
  annotations: {{- include "common.tplvalues.render" (dict "value" .Values.server.ingress.annotations "context" $) | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.server.ingress.ingressClassName }}
  ingressClassName: {{ .Values.server.ingress.ingressClassName }}
  {{- end }}
  rules:
    - host: {{ .Values.server.ingress.hostname | quote }}
      http:
        paths:
          - path: {{ .Values.server.ingress.path }}
            pathType: {{ .Values.server.ingress.pathType }}
            backend:
              service:
                name: {{ include "chromium-bridge.server.serviceName" . }}
                port:
                  number: {{ .Values.server.service.cdpPort }}
          {{- if .Values.server.ingress.extraPaths }}
          {{- include "common.tplvalues.render" (dict "value" .Values.server.ingress.extraPaths "context" $) | nindent 10 }}
          {{- end }}
    {{- range .Values.server.ingress.extraHosts }}
    - host: {{ .name | quote }}
      http:
        paths:
          - path: {{ $.Values.server.ingress.path }}
            pathType: {{ $.Values.server.ingress.pathType }}
            backend:
              service:
                name: {{ include "chromium-bridge.server.serviceName" $ }}
                port:
                  number: {{ $.Values.server.service.cdpPort }}
          {{- if $.Values.server.ingress.extraPaths }}
          {{- include "common.tplvalues.render" (dict "value" $.Values.server.ingress.extraPaths "context" $) | nindent 10 }}
          {{- end }}
    {{- end }}
    {{- if .Values.server.ingress.extraRules }}
    {{- include "common.tplvalues.render" (dict "value" .Values.server.ingress.extraRules "context" $) | nindent 4 }}
    {{- end }}
  {{- if .Values.server.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.server.ingress.hostname | quote }}
      secretName: {{ .Values.server.ingress.tlsSecret | quote }}
    {{- if .Values.server.ingress.extraTls }}
    {{- include "common.tplvalues.render" (dict "value" .Values.server.ingress.extraTls "context" $) | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end -}}
