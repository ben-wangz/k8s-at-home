{{- if and .Values.novnc.enabled .Values.novnc.ingress.enabled -}}
apiVersion: {{ include "common.capabilities.ingress.apiVersion" . }}
kind: Ingress
metadata:
  name: {{ include "chromium-bridge.novnc.fullname" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" (dict "customLabels" .Values.commonLabels "context" $) | nindent 4 }}
  annotations: {{- include "chromium-bridge.ingress.annotations" (dict "context" . "component" "novnc" "ingress" .Values.novnc.ingress) | nindent 4 }}
spec:
  {{- if .Values.novnc.ingress.ingressClassName }}
  ingressClassName: {{ .Values.novnc.ingress.ingressClassName }}
  {{- end }}
  rules:
    - host: {{ .Values.novnc.ingress.hostname | quote }}
      http:
        paths:
          - path: {{ .Values.novnc.ingress.path }}
            pathType: {{ .Values.novnc.ingress.pathType }}
            backend:
              service:
                name: {{ include "chromium-bridge.novnc.serviceName" . }}
                port:
                  number: {{ .Values.novnc.service.port }}
          {{- if .Values.novnc.ingress.extraPaths }}
          {{- include "common.tplvalues.render" (dict "value" .Values.novnc.ingress.extraPaths "context" $) | nindent 10 }}
          {{- end }}
    {{- range .Values.novnc.ingress.extraHosts }}
    - host: {{ .name | quote }}
      http:
        paths:
          - path: {{ $.Values.novnc.ingress.path }}
            pathType: {{ $.Values.novnc.ingress.pathType }}
            backend:
              service:
                name: {{ include "chromium-bridge.novnc.serviceName" $ }}
                port:
                  number: {{ $.Values.novnc.service.port }}
          {{- if $.Values.novnc.ingress.extraPaths }}
          {{- include "common.tplvalues.render" (dict "value" $.Values.novnc.ingress.extraPaths "context" $) | nindent 10 }}
          {{- end }}
    {{- end }}
    {{- if .Values.novnc.ingress.extraRules }}
    {{- include "common.tplvalues.render" (dict "value" .Values.novnc.ingress.extraRules "context" $) | nindent 4 }}
    {{- end }}
  {{- if .Values.novnc.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.novnc.ingress.hostname | quote }}
      secretName: {{ .Values.novnc.ingress.tlsSecret | quote }}
    {{- if .Values.novnc.ingress.extraTls }}
    {{- include "common.tplvalues.render" (dict "value" .Values.novnc.ingress.extraTls "context" $) | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end -}}
