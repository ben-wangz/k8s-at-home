replicas: 1

commonLabels: {}
commonAnnotations: {}
podLabels: {}
podAnnotations: {}

revisionHistoryLimit: 10
updateStrategy: {}

imagePullSecrets: []
affinity: {}
podAffinityPreset: ""
podAntiAffinityPreset: soft
nodeAffinityPreset:
  type: none
  key: ""
  values: []

podSecurityContext:
  enabled: true
  fsGroupChangePolicy: Always
  supplementalGroups: []
  fsGroup: 1001

containerSecurityContext:
  enabled: true
  runAsUser: 1001
  runAsGroup: 1001
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []

image:
  registry: ghcr.io
  repository: tg123/sshpiperd
  tag: full-v1.5.3
  pullPolicy: IfNotPresent

listen:
  address: 0.0.0.0
  port: 22

serverKey:
  existingSecret: ""
  secretName: ""
  secretKey: ssh_host_rsa_key
  privateKey: ""

service:
  type: NodePort
  ports:
    ssh: 22
    sshNodePort: 32022
  annotations: {}
  clusterIP: ""
  sessionAffinity: ""
  sessionAffinityConfig: {}
  externalTrafficPolicy: ""
  loadBalancerSourceRanges: []
  loadBalancerIP: ""
  loadBalancerClass: ""
  extraPorts: []

config:
  plugin: lua
  allowedTargets:
    - gitea-ssh.basic-components
    - "*.codespace"
  script: ""

resources: {}
resourcesPreset: nano

customLivenessProbe: {}
customReadinessProbe: {}
customStartupProbe: {}

extraEnvVars: []
extraEnvVarsSecret: ""
extraVolumeMounts: []
extraVolumes: []

extraDeploy: []
