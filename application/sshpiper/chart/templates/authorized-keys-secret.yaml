{{- if and (not .Values.auth.authorizedKeys.existingSecret) (gt (len .Values.auth.authorizedKeys.values) 0) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sshpiper.authorizedKeysSecretName" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{ .Values.auth.authorizedKeys.secretKey }}: |
    {{- range .Values.auth.authorizedKeys.values }}
    {{ . }}
    {{- end }}
{{- end -}}
