name: release-chart

on:
  push:
    tags:
      - "*-v*"

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.plan.outputs.should_run }}
      app_name: ${{ steps.plan.outputs.app_name }}
      tag_version: ${{ steps.plan.outputs.tag_version }}
      chart_dir: ${{ steps.plan.outputs.chart_dir }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup-forgekit
        id: forgekit
        run: |
          FORGEKIT_BIN="$(bash "$GITHUB_WORKSPACE/setup/forgekit.sh")"
          echo "bin=${FORGEKIT_BIN}" >> "$GITHUB_OUTPUT"
          "${FORGEKIT_BIN}" --version

      - name: resolve-chart-release
        id: plan
        env:
          FORGEKIT_BIN: ${{ steps.forgekit.outputs.bin }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          bash "$GITHUB_WORKSPACE/scripts/release-plan.sh" chart

  publish:
    needs: plan
    if: needs.plan.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup-helm
        uses: azure/setup-helm@v4

      - name: setup-forgekit
        id: forgekit
        run: |
          FORGEKIT_BIN="$(bash "$GITHUB_WORKSPACE/setup/forgekit.sh")"
          echo "bin=${FORGEKIT_BIN}" >> "$GITHUB_OUTPUT"
          "${FORGEKIT_BIN}" --version

      - name: publish-chart
        env:
          FORGEKIT_BIN: ${{ steps.forgekit.outputs.bin }}
          CHART_REGISTRY: ghcr.io/${{ github.repository }}-charts
          CHART_REGISTRY_USERNAME: ${{ github.actor }}
          CHART_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          "$FORGEKIT_BIN" publish chart build \
            --project-root "$GITHUB_WORKSPACE" \
            --chart-dir "${{ needs.plan.outputs.chart_dir }}" \
            --semver \
            --multi-tag
