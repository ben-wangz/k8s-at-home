name: lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-forgekit
        id: forgekit
        run: |
          FORGEKIT_BIN="$(bash "$GITHUB_WORKSPACE/setup/forgekit.sh")"
          echo "bin=${FORGEKIT_BIN}" >> "$GITHUB_OUTPUT"
          "${FORGEKIT_BIN}" --version

      - name: run-forgekit-lint
        env:
          FORGEKIT_BIN: ${{ steps.forgekit.outputs.bin }}
        run: |
          "$FORGEKIT_BIN" --project-root "$GITHUB_WORKSPACE" lint --config "$GITHUB_WORKSPACE/lint.yaml"
