name: publish-images
on:
  workflow_dispatch:
    inputs:
      push:
        description: "Push the images to the registry"
        required: false
        type: boolean
        default: false
  push:
    branches:
      - "main"

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-images:
    strategy:
      matrix:
        include:
          - name_suffix: "aria-ng"
            module: "aria2/aria-ng"
            container_path: "application/aria2/container/aria-ng"
            version_file: "application/aria2/container/aria-ng/VERSION"
          - name_suffix: "aria2"
            module: "aria2/aria2"
            container_path: "application/aria2/container/aria2"
            version_file: "application/aria2/container/aria2/VERSION"
          - name_suffix: "podman-in-container"
            module: "podman-in-container"
            container_path: "application/podman-in-container/container"
            version_file: "application/podman-in-container/container/VERSION"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: checkout-repository
        uses: actions/checkout@v4

      - name: install-podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: setup-forgekit
        id: forgekit
        run: |
          FORGEKIT_BIN="$(bash setup/forgekit.sh)"
          echo "bin=${FORGEKIT_BIN}" >> "$GITHUB_OUTPUT"
          "${FORGEKIT_BIN}" --version

      - name: read-version-file
        id: version
        run: |
          VERSION=$(tr -d '[:space:]' < "${{ matrix.version_file }}")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: build-and-optional-push-image
        env:
          FORGEKIT_BIN: ${{ steps.forgekit.outputs.bin }}
          SHOULD_PUSH: ${{ inputs.push == true || github.ref == 'refs/heads/main' }}
          CONTAINER_REGISTRY: ${{ env.REGISTRY }}
          CONTAINER_REGISTRY_USERNAME: ${{ github.actor }}
          CONTAINER_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_NAME: ${{ github.repository }}-${{ matrix.name_suffix }}
        run: |
          BASE_ARGS=(
            publish container build
            --project-root "$GITHUB_WORKSPACE"
            --container-dir "${{ matrix.container_path }}"
            --module "${{ matrix.module }}"
            --context "${{ matrix.container_path }}"
            --label "org.opencontainers.image.version=${{ steps.version.outputs.version }}"
            --label "org.opencontainers.image.revision=${{ github.sha }}"
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}"
          )

          if [[ "$SHOULD_PUSH" == "true" ]]; then
            "$FORGEKIT_BIN" "${BASE_ARGS[@]}" --push --semver --multi-tag
          else
            "$FORGEKIT_BIN" "${BASE_ARGS[@]}"
          fi
