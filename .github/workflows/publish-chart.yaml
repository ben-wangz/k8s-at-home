---
name: publish-chart
on:
  workflow_dispatch:
    inputs:
      push:
        description: "Push the charts to the registry"
        required: false
        type: boolean
        default: false
  push:
    branches:
      - "main"

jobs:
  build-and-push-charts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - chart_dir: "application/aria2/chart"
          - chart_dir: "application/clash/chart"
          - chart_dir: "application/yacd/chart"
          - chart_dir: "application/ddns-go/chart"
          - chart_dir: "application/podman-in-container/chart"
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: setup-helm
        uses: azure/setup-helm@v4

      - name: setup-forgekit
        id: forgekit
        run: |
          FORGEKIT_BIN="$(bash setup/forgekit.sh)"
          echo "bin=${FORGEKIT_BIN}" >> "$GITHUB_OUTPUT"
          "${FORGEKIT_BIN}" --version

      - name: build-and-push-chart
        env:
          FORGEKIT_BIN: ${{ steps.forgekit.outputs.bin }}
          SHOULD_PUSH: ${{ inputs.push == true || github.ref == 'refs/heads/main' }}
          CHART_REGISTRY: ghcr.io/${{ github.repository }}-charts
          CHART_REGISTRY_USERNAME: ${{ github.actor }}
          CHART_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE_ARGS=(
            publish chart build
            --project-root "$GITHUB_WORKSPACE"
            --chart-dir "${{ matrix.chart_dir }}"
          )

          if [[ "$SHOULD_PUSH" == "true" ]]; then
            "$FORGEKIT_BIN" "${BASE_ARGS[@]}" --push --semver --multi-tag
          else
            "$FORGEKIT_BIN" "${BASE_ARGS[@]}"
          fi
