include:
  - "**/*.go"
  - "**/*.ts"
  - "**/*.tsx"

max_lines_by_ext:
  .go: 250
  .ts: 300
  .tsx: 300

commands:
  - name: shell syntax
    cmd: sh
    args:
      - -c
      - >-
        bash -n setup/forgekit.sh .github/scripts/release-plan.sh &&
        sh -n application/cli-proxy-api/container/bin/cli-proxy-api-render-config
        application/cli-proxy-api/container/bin/cli-proxy-api-xai-login
        application/cli-proxy-api/container/test/test-scripts.sh
  - name: cli-proxy-api script tests
    cmd: application/cli-proxy-api/container/test/test-scripts.sh
    args: []
  - name: gofmt check
    cmd: sh
    args:
      - -c
      - test -z "$(gofmt -l .)"
  - name: sshpiper tests
    cmd: sh
    args:
      - -c
      - go -C application/sshpiper/src test ./...
